<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌍 </title>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#4facfe,#00f2fe);
    }

    .container{
      width:90%;
      max-width:900px;
      margin:40px auto;
    }

    h1{
      color:white;
      text-align:center;
    }

    .search{
      display:flex;
      gap:10px;
      margin:30px 0;
    }

    input{
      flex:1;
      padding:15px;
      font-size:18px;
      border:none;
      border-radius:8px;
    }

    button{
      padding:15px 25px;
      background:#ff9800;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:17px;
    }

    button:hover{
      background:#f57c00;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      margin-top:20px;
      box-shadow:0 5px 15px rgba(0,0,0,.2);
    }

    #result{
      white-space:pre-wrap;
      line-height:1.8;
    }
  </style>

</head>

<body>

<div class="container">

  <h1>🌍 AI Travel Planner</h1>

  <div class="search">

    <input
      id="city"
      placeholder="Enter City Name">

    <button onclick="travelGuide()">

      Generate Plan

    </button>

  </div>

  <div class="card">

    <h2>Travel Guide</h2>

    <div id="result">

      Enter a city and click Generate Plan.

    </div>

  </div>

</div>

<script>

  const GROQ_API_KEY = "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";

  async function travelGuide(){

    const city=document.getElementById("city").value;

    if(city==""){
      alert("Enter a city");
      return;
    }

    document.getElementById("result").innerHTML="Loading...";

    const prompt=`
Create a beautiful travel guide for ${city}.

Include:

🌍 Introduction

📍 Top 5 attractions

🍜 Famous foods

🏨 Recommended hotels

💰 Estimated daily budget

📅 3-day itinerary

💡 Travel tips

Use headings and bullet points.
`;

    try{

      const response=await fetch(

        "https://api.groq.com/openai/v1/chat/completions",

        {

          method:"POST",

          headers:{

            "Content-Type":"application/json",

            "Authorization":"Bearer "+GROQ_API_KEY

          },

          body:JSON.stringify({

            model:"llama-3.3-70b-versatile",

            messages:[

              {

                role:"user",

                content:prompt

              }

            ]

          })

        }

      );

      const data=await response.json();

      document.getElementById("result").innerHTML=

        data.choices[0].message.content
          .replace(/\n/g,"<br>");

    }catch{

      document.getElementById("result").innerHTML=

        "Unable to generate travel guide.";

    }

  }

</script>

</body>
</html>
